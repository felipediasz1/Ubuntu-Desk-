<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verificação 2FA — Ubuntu Desk Admin</title>
  <style nonce="{{ csp_nonce }}">
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #0F172A; --bg2: #1E293B; --bg3: #334155; --cyan: #06B6D4; --text: #E2E8F0; --muted: #94A3B8; --border: #334155; --yellow: #FCD34D; }
    body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .card { background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; padding: 32px; width: 360px; }
    .btn { display: inline-block; padding: 10px 18px; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; border: none; width: 100%; transition: opacity 0.15s; }
    .btn-cyan { background: var(--cyan); color: #0F172A; }
    .alert-warn { background: rgba(251,191,36,0.08); border: 1px solid rgba(251,191,36,0.3); color: var(--yellow); padding: 10px 14px; border-radius: 8px; margin-bottom: 16px; font-size: 13px; }
  </style>
</head>
<body>
  <div class="card">
    <h2 style="margin-bottom:8px;color:var(--cyan);">Ubuntu Desk Admin</h2>
    <h3 style="margin-bottom:8px;font-size:16px;">Verificação em duas etapas</h3>
    <p style="color:var(--muted);font-size:13px;margin-bottom:20px;">Digite o código de 6 dígitos do seu app autenticador, ou um código de recuperação.</p>
    {% if error %}<div class="alert-warn">{{ error }}</div>{% endif %}
    <form method="POST">
      <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
      <label for="totp-input" style="display:block;font-size:12px;color:var(--muted);margin-bottom:6px;">Código</label>
      <input id="totp-input" type="text" name="code" inputmode="numeric" maxlength="8" required autocomplete="one-time-code"
             style="width:100%;padding:10px;border-radius:8px;border:1px solid var(--border);background:var(--bg);color:var(--text);margin-bottom:16px;font-size:20px;letter-spacing:6px;text-align:center;"
             autofocus>
      <button type="submit" class="btn btn-cyan">Verificar</button>
    </form>
    <p style="margin-top:12px;font-size:12px;color:var(--muted);text-align:center;">Você pode usar um código de recuperação de 8 caracteres.</p>
  </div>
</body>
</html>
